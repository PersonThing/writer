name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: writer
          POSTGRES_PASSWORD: writer
          POSTGRES_DB: writer_dev
        ports: ['5434:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://writer:writer@localhost:5434/writer_dev
      SESSION_SECRET: ci-secret
      APP_URL: http://localhost:3456
      ALLOWED_EMAILS: alice@test.local,bob@test.local
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node scripts/migrate.js
      - run: npm test

  deploy:
    # Deploys the full Express server (portfolio + writer + API) to Railway.
    # Railway's builder runs `npm ci && npm run build` itself; we only need
    # to push a fresh tree up.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: curl -fsSL https://railway.com/install.sh | sh
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service shigorika --detach
