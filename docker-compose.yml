services:
  postgres:
    image: postgres:16
    container_name: writer-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: writer
      POSTGRES_PASSWORD: writer
      POSTGRES_DB: writer_dev
    ports:
      - "5434:5432"
    volumes:
      - writer-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U writer -d writer_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  writer-pg-data:
